<div x-data="adminLayout" x-cloak class="flex min-h-screen flex-col bg-background text-slate-900 dark:bg-background-dark dark:text-slate-100">
  <!-- Mobile header -->
  <div class="md:hidden" x-data="mobileHeader">
    <header class="sticky top-0 z-30 flex h-14 items-center justify-between border-b border-slate-200 bg-surface px-4 dark:border-slate-700 dark:bg-surface-dark">
      <button type="button" class="rounded-lg p-2 hover:bg-slate-100 dark:hover:bg-slate-700" @click="$store.ui.openDrawer()" aria-label="Menu">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
      </button>
      <a href="/admin/dashboard" data-navigo class="text-lg font-semibold text-primary-600 dark:text-primary-200" x-t="'common.app_name'"></a>
      <button type="button" class="relative rounded-lg p-2 hover:bg-slate-100 dark:hover:bg-slate-700" aria-label="Notifications">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .53-.21 1.04-.59 1.4L4 17h5m6 0a3 3 0 11-6 0" /></svg>
        <span class="absolute right-1 top-1 inline-flex h-2 w-2 rounded-full bg-danger-500"></span>
      </button>
    </header>
  </div>

  <!-- Web header -->
  <div class="hidden md:block" x-data="webHeader">
    <header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-slate-200 bg-surface px-6 dark:border-slate-700 dark:bg-surface-dark">
      <div class="flex items-center gap-3">
        <button type="button" class="flex items-center gap-2 rounded-lg px-3 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-700" @click="toggleProfileMenu">
          <div class="flex h-8 w-8 items-center justify-center rounded-full bg-primary-500 text-xs font-semibold text-white" x-text="initials()"></div>
          <div class="text-left">
            <div class="text-sm font-medium" x-text="$store.auth.user?.full_name ?? ''"></div>
            <div class="text-xs text-slate-500" x-text="$store.auth.user?.role ?? ''"></div>
          </div>
        </button>
      </div>
      <a href="/admin/dashboard" data-navigo class="text-xl font-semibold text-primary-600 dark:text-primary-200" x-t="'common.app_name'"></a>
      <div class="flex items-center gap-2">
        <button type="button" class="rounded-lg p-2 hover:bg-slate-100 dark:hover:bg-slate-700" aria-label="Search" disabled>
          <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M10 17a7 7 0 100-14 7 7 0 000 14z" /></svg>
        </button>
        <button type="button" class="relative rounded-lg p-2 hover:bg-slate-100 dark:hover:bg-slate-700" @click="toggleNotifications">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .53-.21 1.04-.59 1.4L4 17h5m6 0a3 3 0 11-6 0" /></svg>
          <span class="absolute right-1 top-1 inline-flex h-2 w-2 rounded-full bg-danger-500"></span>
        </button>
      </div>
    </header>
  </div>

  <div class="flex flex-1">
    <!-- Sidebar rail (web only) -->
    <aside class="hidden w-16 shrink-0 flex-col items-center border-r border-slate-200 bg-surface py-4 dark:border-slate-700 dark:bg-surface-dark md:flex" x-data="sidebarRail">
      <template x-for="item in items" :key="item.key">
        <button type="button"
          class="group mb-2 flex h-10 w-10 items-center justify-center rounded-lg transition"
          :class="isActive(item.key) ? 'bg-primary-500 text-white' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'"
          @click="onClick(item)"
          :title="tLabel(item.key)">
          <span x-html="item.icon"></span>
        </button>
      </template>
      <div class="mt-auto">
        <button type="button" class="flex h-10 w-10 items-center justify-center rounded-full bg-primary-600 text-xs font-semibold text-white" @click="toggleProfilePopover" x-text="initials()"></button>
      </div>
    </aside>

    <!-- Sidebar panel (web only) -->
    <aside
      class="hidden overflow-hidden border-r border-slate-200 bg-surface transition-[width] duration-[250ms] dark:border-slate-700 dark:bg-surface-dark md:block"
      :class="$store.ui.sidebarPanelOpen ? 'w-60' : 'w-0'"
      x-data="sidebarPanel">
      <div class="flex h-full flex-col" x-show="$store.ui.sidebarPanelOpen">
        <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3 dark:border-slate-700">
          <h2 class="text-sm font-semibold" x-t="title()"></h2>
          <button type="button" class="rounded p-1 hover:bg-slate-100 dark:hover:bg-slate-700" @click="$store.ui.closeSidebarPanel()" aria-label="Close panel">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>
        <nav class="flex-1 overflow-y-auto p-2">
          <template x-for="sub in subNav()" :key="sub.path">
            <a :href="sub.path" data-navigo class="block rounded-lg px-3 py-2 text-sm hover:bg-slate-100 dark:hover:bg-slate-700" x-t="sub.key"></a>
          </template>
        </nav>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-x-hidden px-4 pb-24 pt-4 md:px-6 md:pb-6" id="route-outlet">
      <div class="flex h-64 items-center justify-center text-slate-500">
        <span x-t="'common.loading'"></span>
      </div>
    </main>
  </div>

  <!-- Web footer -->
  <footer class="hidden border-t border-slate-200 bg-surface px-6 py-3 text-center text-xs text-slate-500 md:block dark:border-slate-700 dark:bg-surface-dark">
    <span>© 2026 Aperant</span>
  </footer>

  <!-- Mobile drawer -->
  <div class="md:hidden" x-data="mobileDrawer">
    <div x-show="$store.ui.mobileDrawerOpen" x-transition.opacity class="fixed inset-0 z-40 bg-black/50" @click="$store.ui.closeDrawer()"></div>
    <aside
      class="fixed inset-y-0 left-0 z-50 w-72 transform overflow-y-auto bg-surface p-4 shadow-xl transition-transform duration-300 dark:bg-surface-dark md:hidden"
      :class="$store.ui.mobileDrawerOpen ? 'translate-x-0' : '-translate-x-full'">
      <div class="mb-4 flex items-center justify-between">
        <div class="text-lg font-semibold text-primary-600 dark:text-primary-200" x-t="'common.app_name'"></div>
        <button type="button" class="rounded p-1" @click="$store.ui.closeDrawer()" aria-label="Close">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      <nav class="space-y-1">
        <template x-for="item in items" :key="item.path">
          <a :href="item.path" data-navigo class="block rounded-lg px-3 py-2 text-sm hover:bg-slate-100 dark:hover:bg-slate-700" @click="$store.ui.closeDrawer()" x-t="item.key"></a>
        </template>
      </nav>
      <hr class="my-4 border-slate-200 dark:border-slate-700" />
      <div class="space-y-2">
        <button type="button" class="flex w-full items-center justify-between rounded-lg px-3 py-2 text-sm hover:bg-slate-100 dark:hover:bg-slate-700" @click="$store.theme.toggle()">
          <span x-t="'common.theme_toggle'"></span>
          <span x-text="$store.theme.isDark() ? '🌙' : '☀️'"></span>
        </button>
        <button type="button" class="flex w-full items-center justify-between rounded-lg px-3 py-2 text-sm hover:bg-slate-100 dark:hover:bg-slate-700" @click="$store.locale.toggle()">
          <span x-t="'common.language_toggle'"></span>
          <span x-text="$store.locale.language.toUpperCase()"></span>
        </button>
        <button type="button" class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-sm text-danger-500 hover:bg-slate-100 dark:hover:bg-slate-700" @click="logout">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
          <span x-t="'common.logout'"></span>
        </button>
      </div>
    </aside>
  </div>

  <!-- Bottom tab bar (mobile only) -->
  <nav class="fixed inset-x-0 bottom-0 z-30 border-t border-slate-200 bg-surface md:hidden dark:border-slate-700 dark:bg-surface-dark" x-data="bottomTabBar" x-show="$store.ui.bottomBarVisible" x-transition.opacity>
    <ul class="flex h-16 items-end justify-around px-2 pb-1">
      <template x-for="(item, idx) in items" :key="item.key">
        <li class="flex-1">
          <template x-if="item.fab">
            <a :href="item.path" data-navigo class="relative mx-auto -mt-6 flex h-14 w-14 items-center justify-center rounded-full bg-primary-500 text-white shadow-lg" :aria-label="tLabel(item.key)">
              <span x-html="item.icon"></span>
            </a>
          </template>
          <template x-if="!item.fab">
            <a :href="item.path" data-navigo class="flex flex-col items-center gap-0.5 py-2 text-xs" :class="isActive(item.path) ? 'text-primary-600 dark:text-primary-200' : 'text-slate-500'" :aria-label="tLabel(item.key)">
              <span x-html="item.icon"></span>
              <span x-t="item.key"></span>
            </a>
          </template>
        </li>
      </template>
    </ul>
  </nav>

  <!-- Global toasts -->
  <div class="fixed right-4 top-20 z-50 space-y-2" aria-live="polite">
    <template x-for="toast in $store.ui.toasts" :key="toast.id">
      <div class="flex items-start gap-2 rounded-lg px-4 py-3 text-sm shadow-lg"
        :class="{
          'bg-success-500 text-white': toast.type === 'success',
          'bg-danger-500 text-white': toast.type === 'error',
          'bg-info-500 text-white': toast.type === 'info',
          'bg-warning-500 text-white': toast.type === 'warning'
        }">
        <span x-text="toast.message"></span>
        <button class="ml-2 text-white/80 hover:text-white" @click="$store.ui.dismissToast(toast.id)" aria-label="Close">×</button>
      </div>
    </template>
  </div>
</div>
