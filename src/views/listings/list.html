<section x-data="listingsListPage()" x-init="init()" x-cloak class="space-y-4">
  <header class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-gray-900 dark:text-white" x-t="'listings.list.title'"></h1>
      <p class="text-sm text-gray-500 dark:text-gray-400" x-t="'listings.list.subtitle'"></p>
    </div>
    <div class="flex items-center gap-2">
      <a href="/admin/listings/new" data-navigo
         class="btn btn-primary inline-flex items-center gap-2"
         x-t="'listings.actions.new'"></a>
    </div>
  </header>

  <div class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm dark:border-gray-700 dark:bg-gray-800">
    <div class="flex flex-col gap-3 md:flex-row md:items-end">
      <div class="flex-1">
        <label class="mb-1 block text-xs font-medium text-gray-600 dark:text-gray-300"
               x-t="'common.search'"></label>
        <input type="search"
               class="input-base w-full"
               :placeholder="$t('listings.list.search_placeholder')"
               x-model.debounce.300ms="params.q"
               @input="onSearch()" />
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium text-gray-600 dark:text-gray-300"
               x-t="'listings.filters.status'"></label>
        <select class="input-base"
                x-model="params.status"
                @change="setStatus(params.status)">
          <template x-for="opt in statusOptions" :key="opt">
            <option :value="opt" x-text="$t('listings.status.' + opt)"></option>
          </template>
        </select>
      </div>
    </div>
  </div>

  <div class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm dark:border-gray-700 dark:bg-gray-800">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-700/30">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'listings.columns.thumbnail'"></th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'listings.columns.title'"></th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'listings.columns.price'"></th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'listings.columns.status'"></th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'listings.columns.created_at'"></th>
            <th class="px-4 py-3 text-right text-xs font-semibold uppercase text-gray-500" x-t="'common.actions'"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <template x-if="loading && items.length === 0">
            <tr><td colspan="6" class="px-4 py-8 text-center text-sm text-gray-500" x-t="'common.loading'"></td></tr>
          </template>
          <template x-if="!loading && items.length === 0">
            <tr><td colspan="6" class="px-4 py-8 text-center text-sm text-gray-500" x-t="'common.no_data'"></td></tr>
          </template>
          <template x-for="item in items" :key="item.id">
            <tr class="cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/40"
                @click="goDetail(item.id)">
              <td class="px-4 py-3">
                <img :src="item.media?.[0]?.url ?? 'https://picsum.photos/seed/no/64/48'"
                     class="h-12 w-16 rounded object-cover" alt="" />
              </td>
              <td class="px-4 py-3">
                <div class="font-medium text-gray-900 dark:text-white line-clamp-1" x-text="item.title"></div>
                <div class="text-xs text-gray-500" x-text="item.id"></div>
              </td>
              <td class="px-4 py-3 text-sm text-gray-700 dark:text-gray-200" x-text="formatPrice(item)"></td>
              <td class="px-4 py-3">
                <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium"
                      :class="statusBadgeClass(item.status)"
                      x-text="statusLabel(item.status)"></span>
              </td>
              <td class="px-4 py-3 text-sm text-gray-500" x-text="formatDate(item.created_at)"></td>
              <td class="px-4 py-3 text-right" @click.stop>
                <div class="inline-flex gap-1">
                  <button type="button"
                          class="btn btn-secondary px-2 py-1 text-xs"
                          x-show="canApprove() && item.status === 'pending'"
                          @click="openDialog('approve', item.id)"
                          x-t="'listings.actions.approve'"></button>
                  <button type="button"
                          class="btn btn-secondary px-2 py-1 text-xs"
                          x-show="canApprove() && item.status === 'pending'"
                          @click="openDialog('reject', item.id)"
                          x-t="'listings.actions.reject'"></button>
                  <button type="button"
                          class="btn btn-secondary px-2 py-1 text-xs"
                          x-show="canFeature() && item.status === 'approved'"
                          @click="openDialog('feature', item.id)"
                          x-t="'listings.actions.feature'"></button>
                  <button type="button"
                          class="btn btn-danger px-2 py-1 text-xs"
                          x-show="canDelete()"
                          @click="openDialog('delete', item.id)"
                          x-t="'listings.actions.delete'"></button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <div class="flex items-center justify-between border-t border-gray-200 px-4 py-3 text-sm dark:border-gray-700">
      <span class="text-gray-500">
        <span x-text="total"></span>
      </span>
      <div class="flex items-center gap-1">
        <button type="button"
                class="btn btn-secondary px-3 py-1 text-xs"
                :disabled="params.page <= 1"
                @click="goPage(params.page - 1)"
                x-t="'common.back'"></button>
        <span class="px-2 text-gray-600 dark:text-gray-300">
          <span x-text="params.page"></span> / <span x-text="pages"></span>
        </span>
        <button type="button"
                class="btn btn-secondary px-3 py-1 text-xs"
                :disabled="params.page >= pages"
                @click="goPage(params.page + 1)"
                x-t="'common.next'"></button>
      </div>
    </div>
  </div>

  <div x-show="dialog.type" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
       @keydown.escape.window="closeDialog()">
    <div class="w-full max-w-md rounded-lg bg-white p-6 shadow-xl dark:bg-gray-800" @click.outside="closeDialog()">
      <h2 class="mb-2 text-lg font-semibold text-gray-900 dark:text-white"
          x-text="$t('listings.dialogs.' + (dialog.type ?? 'approve') + '_title')"></h2>
      <p class="mb-4 text-sm text-gray-600 dark:text-gray-300"
         x-text="$t('listings.dialogs.' + (dialog.type ?? 'approve') + '_body')"></p>

      <div x-show="dialog.type === 'reject'" class="mb-4">
        <label class="mb-1 block text-xs font-medium text-gray-600 dark:text-gray-300"
               x-t="'listings.dialogs.reject_reason_label'"></label>
        <textarea class="input-base w-full" rows="3" x-model="dialog.payload.reason"></textarea>
      </div>
      <div x-show="dialog.type === 'feature'" class="mb-4">
        <label class="mb-1 block text-xs font-medium text-gray-600 dark:text-gray-300"
               x-t="'listings.dialogs.feature_duration_label'"></label>
        <input type="number" min="1" max="90"
               class="input-base w-full"
               x-model.number="dialog.payload.durationDays" />
      </div>

      <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-secondary" @click="closeDialog()" x-t="'common.cancel'"></button>
        <button type="button"
                class="btn"
                :class="dialog.type === 'delete' ? 'btn-danger' : 'btn-primary'"
                @click="confirmDialog()"
                x-t="'common.confirm'"></button>
      </div>
    </div>
  </div>
</section>
