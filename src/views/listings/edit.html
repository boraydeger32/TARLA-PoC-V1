<section x-data="listingEditPage()" x-init="init()" x-cloak class="space-y-4">
  <header>
    <h1 class="text-2xl font-semibold text-gray-900 dark:text-white"
        x-text="isCreate ? $t('listings.form.create_title') : $t('listings.form.edit_title')"></h1>
  </header>

  <form @submit.prevent="onSubmit()"
        class="space-y-4 rounded-lg border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-700 dark:bg-gray-800">
    <div>
      <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200" x-t="'listings.form.title_label'"></label>
      <input type="text" class="input-base w-full" x-model="form.title" />
      <p x-show="error('title')" class="mt-1 text-xs text-red-600" x-text="error('title')"></p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200" x-t="'listings.form.description_label'"></label>
      <textarea class="input-base w-full" rows="5" x-model="form.description"></textarea>
      <p x-show="error('description')" class="mt-1 text-xs text-red-600" x-text="error('description')"></p>
    </div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200" x-t="'listings.form.price_label'"></label>
        <input type="number" min="0" step="100" class="input-base w-full" x-model.number="form.price" />
        <p x-show="error('price')" class="mt-1 text-xs text-red-600" x-text="error('price')"></p>
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200" x-t="'listings.form.currency_label'"></label>
        <select class="input-base w-full" x-model="form.currency">
          <template x-for="c in currencyOptions" :key="c">
            <option :value="c" x-text="c"></option>
          </template>
        </select>
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200" x-t="'listings.form.area_label'"></label>
        <input type="number" min="0" step="1" class="input-base w-full" x-model.number="form.area_m2" />
        <p x-show="error('area_m2')" class="mt-1 text-xs text-red-600" x-text="error('area_m2')"></p>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200" x-t="'listings.form.category_label'"></label>
        <select class="input-base w-full" x-model="form.category_id">
          <option value="">--</option>
          <template x-for="c in categories" :key="c.id">
            <option :value="c.id" x-text="c.name_tr"></option>
          </template>
        </select>
        <p x-show="error('category_id')" class="mt-1 text-xs text-red-600" x-text="error('category_id')"></p>
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200" x-t="'listings.form.zoning_label'"></label>
        <select class="input-base w-full" x-model="form.zoning_status">
          <template x-for="z in zoningOptions" :key="z">
            <option :value="z" x-text="z"></option>
          </template>
        </select>
      </div>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200" x-t="'listings.form.location_label'"></label>
      <input type="text" class="input-base w-full" x-model="form.location_id" placeholder="loc-..." />
      <p x-show="error('location_id')" class="mt-1 text-xs text-red-600" x-text="error('location_id')"></p>
    </div>

    <p x-show="rootError" class="rounded-md bg-red-50 p-3 text-sm text-red-700 dark:bg-red-900/40 dark:text-red-200" x-text="rootError"></p>

    <div class="flex justify-end gap-2 border-t border-gray-200 pt-4 dark:border-gray-700">
      <button type="button" class="btn btn-secondary" @click="cancel()" x-t="'common.cancel'"></button>
      <button type="submit" class="btn btn-primary" :disabled="submitting">
        <span x-show="!submitting" x-t="'common.save'"></span>
        <span x-show="submitting" x-t="'common.loading'"></span>
      </button>
    </div>
  </form>
</section>
