<section x-data="reportsPage()" x-init="init()" x-cloak class="space-y-4">
  <header>
    <h1 class="text-2xl font-semibold text-gray-900 dark:text-white" x-t="'navigation.reports'"></h1>
    <p class="text-sm text-gray-500 dark:text-gray-400" x-t="'reports.subtitle'"></p>
  </header>

  <div class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm dark:border-gray-700 dark:bg-gray-800">
    <div class="grid grid-cols-1 gap-3 md:grid-cols-3">
      <div>
        <label class="mb-1 block text-xs font-medium" x-t="'common.status'"></label>
        <select class="input-base" x-model="params.status" @change="setStatus(params.status)">
          <template x-for="s in statusOptions" :key="s">
            <option :value="s" x-text="$t('reports.status.' + s, { defaultValue: s })"></option>
          </template>
        </select>
      </div>
    </div>
  </div>

  <div class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm dark:border-gray-700 dark:bg-gray-800">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
      <thead class="bg-gray-50 dark:bg-gray-700/30">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'reports.columns.reason'"></th>
          <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'reports.columns.target'"></th>
          <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'reports.columns.reporter'"></th>
          <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'common.status'"></th>
          <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'common.created_at'"></th>
          <th class="px-4 py-3 text-right text-xs font-semibold uppercase text-gray-500" x-t="'common.actions'"></th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
        <template x-if="loading && items.length === 0">
          <tr><td colspan="6" class="p-6 text-center text-sm text-gray-500" x-t="'common.loading'"></td></tr>
        </template>
        <template x-if="!loading && items.length === 0">
          <tr><td colspan="6" class="p-6 text-center text-sm text-gray-500" x-t="'common.no_data'"></td></tr>
        </template>
        <template x-for="r in items" :key="r.id">
          <tr>
            <td class="px-4 py-3">
              <div class="font-medium text-gray-900 dark:text-white" x-text="r.reason"></div>
              <div class="text-xs text-gray-500" x-text="r.description"></div>
            </td>
            <td class="px-4 py-3 text-sm font-mono text-gray-500" x-text="r.target_type + ' · ' + r.target_id"></td>
            <td class="px-4 py-3 text-sm font-mono text-gray-500" x-text="r.reporter_id"></td>
            <td class="px-4 py-3">
              <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium" :class="statusBadge(r.status)" x-text="statusLabel(r.status)"></span>
            </td>
            <td class="px-4 py-3 text-sm text-gray-500" x-text="formatDateTime(r.created_at)"></td>
            <td class="px-4 py-3 text-right">
              <template x-if="r.status === 'open' || r.status === 'in_review'">
                <div class="inline-flex gap-1">
                  <button type="button" class="btn btn-primary px-2 py-1 text-xs" @click="openDialog('resolve', r)" x-t="'reports.actions.resolve'"></button>
                  <button type="button" class="btn btn-secondary px-2 py-1 text-xs" @click="openDialog('dismiss', r)" x-t="'reports.actions.dismiss'"></button>
                </div>
              </template>
            </td>
          </tr>
        </template>
      </tbody>
    </table>

    <div class="flex items-center justify-between border-t border-gray-200 px-4 py-3 text-sm dark:border-gray-700">
      <span class="text-gray-500" x-text="total"></span>
      <div class="flex items-center gap-1">
        <button type="button" class="btn btn-secondary px-3 py-1 text-xs" :disabled="params.page <= 1" @click="goPage(params.page - 1)" x-t="'common.back'"></button>
        <span class="px-2"><span x-text="params.page"></span> / <span x-text="pages()"></span></span>
        <button type="button" class="btn btn-secondary px-3 py-1 text-xs" :disabled="params.page >= pages()" @click="goPage(params.page + 1)" x-t="'common.next'"></button>
      </div>
    </div>
  </div>

  <div x-show="dialog.type" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" @keydown.escape.window="closeDialog()">
    <div class="w-full max-w-md rounded-lg bg-white p-6 shadow-xl dark:bg-gray-800" @click.outside="closeDialog()">
      <h2 class="mb-2 text-lg font-semibold text-gray-900 dark:text-white"
          x-text="$t('reports.dialogs.' + (dialog.type ?? 'resolve') + '_title')"></h2>
      <p class="mb-4 text-sm text-gray-600 dark:text-gray-300"
         x-text="$t('reports.dialogs.' + (dialog.type ?? 'resolve') + '_body')"></p>
      <textarea class="input-base mb-4 w-full" rows="3" x-model="dialog.note"></textarea>
      <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-secondary" @click="closeDialog()" x-t="'common.cancel'"></button>
        <button type="button" class="btn btn-primary" @click="confirm()" x-t="'common.confirm'"></button>
      </div>
    </div>
  </div>
</section>
