<section x-data="transactionsPage()" x-init="init()" x-cloak class="space-y-4">
  <header class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-gray-900 dark:text-white" x-t="'navigation.transactions'"></h1>
    <button type="button" class="btn btn-secondary" @click="exportCsv()" x-t="'transactions.actions.export'"></button>
  </header>

  <div class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm dark:border-gray-700 dark:bg-gray-800">
    <div class="grid grid-cols-1 gap-3 md:grid-cols-3">
      <div>
        <label class="mb-1 block text-xs font-medium" x-t="'common.search'"></label>
        <input type="search" class="input-base w-full" x-model.debounce.300ms="params.q" @input="apply()" :placeholder="$t('transactions.search_placeholder')" />
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium" x-t="'common.status'"></label>
        <select class="input-base" x-model="params.status" @change="setStatus(params.status)">
          <template x-for="s in statusOptions" :key="s">
            <option :value="s" x-text="$t('transactions.status.' + s, { defaultValue: s })"></option>
          </template>
        </select>
      </div>
    </div>
  </div>

  <div class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm dark:border-gray-700 dark:bg-gray-800">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-700/30">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'transactions.columns.id'"></th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'transactions.columns.user'"></th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'transactions.columns.package'"></th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'transactions.columns.amount'"></th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'common.status'"></th>
            <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500" x-t="'common.created_at'"></th>
            <th class="px-4 py-3 text-right text-xs font-semibold uppercase text-gray-500" x-t="'common.actions'"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <template x-if="loading && items.length === 0">
            <tr><td colspan="7" class="p-6 text-center text-sm text-gray-500" x-t="'common.loading'"></td></tr>
          </template>
          <template x-if="!loading && items.length === 0">
            <tr><td colspan="7" class="p-6 text-center text-sm text-gray-500" x-t="'common.no_data'"></td></tr>
          </template>
          <template x-for="t in items" :key="t.id">
            <tr>
              <td class="px-4 py-3 text-sm font-mono" x-text="t.id"></td>
              <td class="px-4 py-3 text-sm font-mono text-gray-500" x-text="t.user_id"></td>
              <td class="px-4 py-3 text-sm" x-text="t.package_id"></td>
              <td class="px-4 py-3 text-sm font-medium" x-text="formatPrice(t.amount, t.currency)"></td>
              <td class="px-4 py-3">
                <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium" :class="statusBadge(t.status)" x-text="statusLabel(t.status)"></span>
              </td>
              <td class="px-4 py-3 text-sm text-gray-500" x-text="formatDateTime(t.created_at)"></td>
              <td class="px-4 py-3 text-right">
                <button type="button" class="btn btn-secondary px-2 py-1 text-xs"
                        x-show="t.status === 'completed'"
                        @click="openRefund(t)"
                        x-t="'transactions.actions.refund'"></button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <div class="flex items-center justify-between border-t border-gray-200 px-4 py-3 text-sm dark:border-gray-700">
      <span class="text-gray-500" x-text="total"></span>
      <div class="flex items-center gap-1">
        <button type="button" class="btn btn-secondary px-3 py-1 text-xs" :disabled="params.page <= 1" @click="goPage(params.page - 1)" x-t="'common.back'"></button>
        <span class="px-2 text-gray-600 dark:text-gray-300"><span x-text="params.page"></span> / <span x-text="pages()"></span></span>
        <button type="button" class="btn btn-secondary px-3 py-1 text-xs" :disabled="params.page >= pages()" @click="goPage(params.page + 1)" x-t="'common.next'"></button>
      </div>
    </div>
  </div>

  <div x-show="dialog.type" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" @keydown.escape.window="closeDialog()">
    <div class="w-full max-w-md rounded-lg bg-white p-6 shadow-xl dark:bg-gray-800" @click.outside="closeDialog()">
      <h2 class="mb-2 text-lg font-semibold text-gray-900 dark:text-white" x-t="'transactions.dialogs.refund_title'"></h2>
      <p class="mb-4 text-sm text-gray-600 dark:text-gray-300" x-t="'transactions.dialogs.refund_body'"></p>
      <textarea class="input-base mb-4 w-full" rows="3" x-model="dialog.reason"></textarea>
      <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-secondary" @click="closeDialog()" x-t="'common.cancel'"></button>
        <button type="button" class="btn btn-danger" @click="confirm()" x-t="'common.confirm'"></button>
      </div>
    </div>
  </div>
</section>
