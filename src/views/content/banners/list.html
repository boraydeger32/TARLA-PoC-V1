<section x-data="bannersPage()" x-init="init()" x-cloak class="space-y-4">
  <header class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-gray-900 dark:text-white" x-t="'navigation.banners'"></h1>
    <button type="button" class="btn btn-primary" @click="openCreate()" x-t="'content.banners.new'"></button>
  </header>

  <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">
    <template x-if="loading">
      <div class="p-4 text-sm text-gray-500" x-t="'common.loading'"></div>
    </template>
    <template x-for="b in items" :key="b.id">
      <article class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm dark:border-gray-700 dark:bg-gray-800">
        <img :src="b.image_url" alt="" class="h-32 w-full object-cover" onerror="this.style.display='none'" />
        <div class="p-4">
          <div class="flex items-center justify-between">
            <h2 class="text-sm font-semibold" x-text="b.title_tr"></h2>
            <span class="rounded bg-gray-100 px-2 py-0.5 text-xs dark:bg-gray-700" x-text="positionLabel(b.position)"></span>
          </div>
          <p class="mt-1 text-xs text-gray-500" x-text="b.title_en"></p>
          <div class="mt-2 text-xs text-gray-500">
            <span x-text="b.is_active ? $t('common.yes') : $t('common.no')"></span>
            · <span x-text="'#' + b.sort_order"></span>
          </div>
          <div class="mt-3 flex justify-end gap-2">
            <button type="button" class="btn btn-secondary px-2 py-1 text-xs" @click="openEdit(b)" x-t="'common.edit'"></button>
            <button type="button" class="btn btn-danger px-2 py-1 text-xs" @click="confirmDelete(b)" x-t="'common.delete'"></button>
          </div>
        </div>
      </article>
    </template>
  </div>

  <div x-show="showForm" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" @keydown.escape.window="closeForm()">
    <div class="w-full max-w-2xl rounded-lg bg-white p-6 shadow-xl dark:bg-gray-800" @click.outside="closeForm()">
      <h2 class="mb-4 text-lg font-semibold text-gray-900 dark:text-white"
          x-text="editing ? $t('common.edit') : $t('content.banners.new')"></h2>
      <form @submit.prevent="submit()" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="mb-1 block text-xs font-medium">Başlık (TR)</label>
            <input type="text" class="input-base w-full" x-model="form.title_tr" />
            <p x-show="error('title_tr')" class="text-xs text-red-600" x-text="error('title_tr')"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium">Title (EN)</label>
            <input type="text" class="input-base w-full" x-model="form.title_en" />
            <p x-show="error('title_en')" class="text-xs text-red-600" x-text="error('title_en')"></p>
          </div>
        </div>
        <div>
          <label class="mb-1 block text-xs font-medium" x-t="'content.banners.form.image_url'"></label>
          <input type="url" class="input-base w-full" x-model="form.image_url" />
          <p x-show="error('image_url')" class="text-xs text-red-600" x-text="error('image_url')"></p>
        </div>
        <div>
          <label class="mb-1 block text-xs font-medium" x-t="'content.banners.form.link_url'"></label>
          <input type="url" class="input-base w-full" x-model="form.link_url" />
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="mb-1 block text-xs font-medium" x-t="'content.banners.form.position'"></label>
            <select class="input-base w-full" x-model="form.position">
              <template x-for="p in positionOptions" :key="p">
                <option :value="p" x-text="positionLabel(p)"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium" x-t="'content.banners.form.sort_order'"></label>
            <input type="number" min="0" class="input-base w-full" x-model.number="form.sort_order" />
          </div>
          <div class="flex items-end">
            <label class="inline-flex items-center gap-2 text-sm">
              <input type="checkbox" x-model="form.is_active" />
              <span x-t="'common.yes'"></span>
            </label>
          </div>
        </div>
        <div class="flex justify-end gap-2 border-t border-gray-200 pt-3 dark:border-gray-700">
          <button type="button" class="btn btn-secondary" @click="closeForm()" x-t="'common.cancel'"></button>
          <button type="submit" class="btn btn-primary" x-t="'common.save'"></button>
        </div>
      </form>
    </div>
  </div>
</section>
