<section x-data="faqsPage()" x-init="init()" x-cloak class="space-y-4">
  <header class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-gray-900 dark:text-white" x-t="'navigation.faqs'"></h1>
    <button type="button" class="btn btn-primary" @click="openCreate()" x-t="'content.faqs.new'"></button>
  </header>

  <div class="rounded-lg border border-gray-200 bg-white shadow-sm dark:border-gray-700 dark:bg-gray-800">
    <template x-if="loading">
      <p class="p-6 text-sm text-gray-500" x-t="'common.loading'"></p>
    </template>
    <ul class="divide-y divide-gray-200 dark:divide-gray-700">
      <template x-for="f in items" :key="f.id">
        <li>
          <div class="flex items-center justify-between px-4 py-3">
            <button type="button" class="flex-1 text-left" @click="toggle(f.id)">
              <span class="text-sm font-medium text-gray-900 dark:text-white" x-text="f.question_tr"></span>
              <span class="ml-2 text-xs text-gray-500" x-text="f.category"></span>
            </button>
            <div class="flex gap-1">
              <button type="button" class="btn btn-secondary px-2 py-1 text-xs" @click="openEdit(f)" x-t="'common.edit'"></button>
              <button type="button" class="btn btn-danger px-2 py-1 text-xs" @click="confirmDelete(f)" x-t="'common.delete'"></button>
            </div>
          </div>
          <div x-show="expandedId === f.id" x-cloak class="bg-gray-50 px-4 py-3 text-sm text-gray-700 dark:bg-gray-700/30 dark:text-gray-200">
            <p x-text="f.answer_tr"></p>
            <hr class="my-2 border-gray-200 dark:border-gray-600" />
            <p class="text-xs text-gray-500" x-text="f.answer_en"></p>
          </div>
        </li>
      </template>
    </ul>
  </div>

  <div x-show="showForm" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" @keydown.escape.window="closeForm()">
    <div class="w-full max-w-2xl rounded-lg bg-white p-6 shadow-xl dark:bg-gray-800" @click.outside="closeForm()">
      <h2 class="mb-4 text-lg font-semibold text-gray-900 dark:text-white"
          x-text="editing ? $t('common.edit') : $t('content.faqs.new')"></h2>
      <form @submit.prevent="submit()" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="mb-1 block text-xs font-medium">Soru (TR)</label>
            <input type="text" class="input-base w-full" x-model="form.question_tr" />
            <p x-show="error('question_tr')" class="text-xs text-red-600" x-text="error('question_tr')"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium">Question (EN)</label>
            <input type="text" class="input-base w-full" x-model="form.question_en" />
            <p x-show="error('question_en')" class="text-xs text-red-600" x-text="error('question_en')"></p>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="mb-1 block text-xs font-medium">Cevap (TR)</label>
            <textarea class="input-base w-full" rows="3" x-model="form.answer_tr"></textarea>
            <p x-show="error('answer_tr')" class="text-xs text-red-600" x-text="error('answer_tr')"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium">Answer (EN)</label>
            <textarea class="input-base w-full" rows="3" x-model="form.answer_en"></textarea>
            <p x-show="error('answer_en')" class="text-xs text-red-600" x-text="error('answer_en')"></p>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="mb-1 block text-xs font-medium" x-t="'content.faqs.form.category'"></label>
            <input type="text" class="input-base w-full" x-model="form.category" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium" x-t="'content.faqs.form.sort_order'"></label>
            <input type="number" min="0" class="input-base w-full" x-model.number="form.sort_order" />
          </div>
          <div class="flex items-end">
            <label class="inline-flex items-center gap-2 text-sm">
              <input type="checkbox" x-model="form.is_active" />
              <span x-t="'common.yes'"></span>
            </label>
          </div>
        </div>
        <div class="flex justify-end gap-2 border-t border-gray-200 pt-3 dark:border-gray-700">
          <button type="button" class="btn btn-secondary" @click="closeForm()" x-t="'common.cancel'"></button>
          <button type="submit" class="btn btn-primary" x-t="'common.save'"></button>
        </div>
      </form>
    </div>
  </div>
</section>
